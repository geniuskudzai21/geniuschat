<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GENIUSCHAT — Sign In</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'blue': 'rgb(59, 130, 246)',
                        'blue-light': 'rgb(147, 197, 253)',
                        'silver': '#e5e7eb',
                        'silver-dark': '#9ca3af',
                        'silver-light': '#f3f4f6',
                        'darkgrey': '#374151',
                        'darkgrey-light': '#4b5563',
                        'darkgrey-dark': '#1f2937'
                    },
                    fontFamily: {
                        'mono': ['Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-silver font-mono overflow-hidden min-h-screen flex items-center justify-center">
    
    <!-- Background Pattern -->
    <div class="absolute inset-0 bg-gradient-to-br from-black via-darkgrey-dark to-black">
        <div class="absolute inset-0 bg-gradient-to-br from-blue/5 via-transparent to-blue/5 opacity-30"></div>
    </div>
    
    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-sm mx-auto p-4">
        <div class="bg-gradient-to-b from-darkgrey-dark to-black border-2 border-blue/30 rounded-2xl p-6 shadow-2xl shadow-blue/20 backdrop-blur-xl relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-blue/10 to-transparent opacity-50"></div>
            
            <div class="relative z-10">
                <!-- Logo and Title -->
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue/20 to-blue/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border-2 border-blue/30 shadow-xl shadow-blue/20 backdrop-blur">
                        <i class="fas fa-network-wired text-2xl text-blue"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white tracking-wider mb-1">GENIUSCHAT</h1>
                    <p class="text-silver-dark text-xs tracking-widest text-blue/80">SECURE COMMUNICATION</p>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-silver-dark mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-silver-dark text-sm"></i>
                            </div>
                            <input type="email" id="email" required placeholder="your@email.com" 
                                class="w-full pl-10 pr-4 py-2 bg-darkgrey-light/50 border-2 border-blue/30 rounded-lg text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono text-sm backdrop-blur transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-silver-dark mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-silver-dark text-sm"></i>
                            </div>
                            <input type="password" id="password" required placeholder="••••••••" 
                                class="w-full pl-10 pr-4 py-2 bg-darkgrey-light/50 border-2 border-blue/30 rounded-lg text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono text-sm backdrop-blur transition-all">
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer">
                            <div class="w-11 h-6 bg-darkgrey-light/50 peer-focus:ring-4 peer-focus:ring-blue/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue"></div>
                            <span class="ml-3 text-sm text-silver-dark">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-blue hover:text-blue-light transition-colors">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="w-full py-2 bg-gradient-to-r from-blue to-blue-dark text-white rounded-lg transition-all hover:scale-105 hover:shadow-lg hover:shadow-blue/30 font-mono font-bold text-sm">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        SIGN IN
                    </button>
                </form>
                
                <!-- Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-silver/30"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-transparent text-silver-dark">OR</span>
                    </div>
                </div>
                
                <!-- Sign Up Link -->
                <div class="text-center">
                    <p class="text-silver-dark text-sm mb-4">Don't have an account?</p>
                    <a href="signup.html" class="inline-flex items-center px-6 py-3 text-blue border-2 border-blue/30 rounded-2xl hover:bg-blue/10 transition-all font-mono font-medium">
                        <i class="fas fa-user-plus mr-2"></i>
                        CREATE ACCOUNT
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Config Script -->
    <script src="config.js"></script>
    <!-- Auth Script -->
    <script src="auth.js"></script>
    
    <script>
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }
            
            const result = await signInWithEmail(email, password);
            if (result) {
                // Redirect to main app
                window.location.href = 'index.html';
            }
        });
        
        // Show error function
        function showError(message) {
            // Create error notification
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed top-4 right-4 bg-red-500/20 border-2 border-red-500/50 rounded-xl p-4 text-red-400 font-mono text-sm backdrop-blur z-50';
            errorDiv.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    <span>ERROR: ${message}</span>
                </div>
            `;
            
            document.body.appendChild(errorDiv);
            
            // Remove after 3 seconds
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }
    </script>
</body>
</html>
