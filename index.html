<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GENIUSCHAT — Secure Messaging</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'blue': 'rgb(59, 130, 246)',
               
                        'blue-light': 'rgb(147, 197, 253)',
                        'silver': '#e5e7eb',
                        'silver-dark': '#9ca3af',
                        'silver-light': '#f3f4f6',
                        'darkgrey': '#374151',
                        'darkgrey-light': '#4b5563',
                        'darkgrey-dark': '#1f2937'
                    },
                    fontFamily: {
                        'mono': ['Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    </head>
<body class="bg-black text-silver font-mono overflow-hidden">

    <!-- Main App Container -->
    <div class="flex h-screen overflow-hidden bg-gradient-to-br from-black via-darkgrey-dark to-black">
        
        <!-- ======================== SIDEBAR ======================== -->
        <aside class="sidebar-mobile fixed inset-y-0 left-0 z-30 w-80 bg-gradient-to-b from-darkgrey-dark to-black border-b border-blue/20 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 shadow-2xl shadow-blue/10">
            <div class="flex flex-col h-full">
                <!-- Sidebar Header -->
                <div class="p-6 border-b border-blue/20 bg-gradient-to-r from-darkgrey-dark to-darkgrey-light relative overflow-hidden">
                    <div class="absolute inset-0 bg-blue/5 opacity-50"></div>
                    <div class="relative z-10">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <h1 class="text-2xl font-bold text-white tracking-wider">GENIUSCHAT</h1>
                            </div>
                            <button id="closeSidebarBtn" class="md:hidden text-silver hover:text-blue transition-colors hover:scale-110">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                        <p class="text-sm text-silver-dark mt-2 tracking-widest text-blue/80">SECURE COMMUNICATION</p>
                    </div>
                </div>

                <!-- Channels List -->
                <div class="flex-1 overflow-y-auto p-5 space-y-2">
                    <div class="flex items-center justify-between mb-6">
                        <h4 class="text-xs font-bold text-silver-dark uppercase tracking-widest">Channels</h4>
                        <button id="addChannelBtn" class="text-blue hover:text-blue-light transition-colors hover:scale-110">
                            <i class="fas fa-plus text-sm"></i>
                        </button>
                    </div>
                    <div id="channelsList" class="space-y-2">
                        <!-- Dynamic channels will be injected here -->
                    </div>
                </div>

                <!-- User Profile Summary -->
                <div class="p-5 border-t border-blue/10 bg-darkgrey-dark/50 backdrop-blur">
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <div class="w-14 h-14 bg-gradient-to-br from-silver to-silver-dark rounded-2xl flex items-center justify-center text-darkgrey font-bold text-lg border-2 border-blue/30 shadow-lg">
                                GU
                            </div>
                            <span class="absolute bottom-0 right-0 w-4 h-4 bg-blue rounded-full border-2 border-darkgrey-dark animate-pulse"></span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-white text-lg">Guest User</h3>
                            <p class="text-sm text-blue font-medium">ACTIVE</p>
                        </div>
                        <button id="themeToggle" class="p-3 rounded-xl bg-blue/10 border border-blue/30 text-blue hover:bg-blue/20 transition-all hover:scale-105">
                            <i class="fas fa-sign-out-alt text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ======================== MAIN CHAT AREA ======================== -->
        <main class="flex-1 flex flex-col h-full w-full overflow-hidden bg-gradient-to-br from-black to-darkgrey-dark">
            
            <!-- Chat Header -->
            <header class="px-8 py-5 flex items-center justify-between bg-gradient-to-r from-darkgrey-dark via-darkgrey to-darkgrey-dark backdrop-blur-xl border-b border-blue/20 relative">
                <div class="absolute inset-0 bg-gradient-to-r from-blue/5 to-transparent"></div>
                <div class="relative z-10 flex items-center space-x-6">
                    <button id="openSidebarBtn" class="md:hidden text-silver hover:text-blue transition-colors hover:scale-110">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div>
                        <h2 id="channelName" class="text-2xl font-bold text-white tracking-wide mb-1">#general</h2>
                        <p id="channelStatus" class="text-sm text-blue flex items-center gap-2 font-medium">
                            <span class="w-2 h-2 bg-blue rounded-full animate-pulse"></span>
                            <span>12 NODES ACTIVE</span>
                        </p>
                    </div>
                </div>
            </header>

            <!-- Messages Container -->
            <div id="messagesContainer" class="messages-container flex-1 overflow-y-auto p-8 space-y-4 bg-gradient-to-b from-black via-darkgrey-dark/50 to-black relative">
                <div class="absolute inset-0 bg-gradient-to-br from-blue/5 via-transparent to-blue/5 opacity-30"></div>
                <!-- Welcome Message -->
                <div class="flex flex-col items-center justify-center h-full text-center relative z-10">
                    <div class="w-20 h-20 bg-gradient-to-br from-blue/20 to-blue/10 rounded-3xl flex items-center justify-center mb-8 border-2 border-blue/30 shadow-2xl shadow-blue/20 backdrop-blur">
                        <i class="fas fa-network-wired text-3xl text-blue"></i>
                    </div>
                    <h3 class="text-3xl font-bold text-white mb-4 tracking-wider">GENIUSCHAT TERMINAL</h3>
                    <p class="text-silver-dark text-lg max-w-md font-medium leading-relaxed">Secure channel established. Awaiting transmission...</p>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="px-8 py-3 hidden relative z-10">
                <div class="flex items-center space-x-3 text-sm text-blue font-medium">
                    <div class="flex space-x-1">
                        <span class="w-2 h-2 bg-blue rounded-full inline-block animate-bounce"></span>
                        <span class="w-2 h-2 bg-blue rounded-full inline-block animate-bounce" style="animation-delay: 0.2s"></span>
                        <span class="w-2 h-2 bg-blue rounded-full inline-block animate-bounce" style="animation-delay: 0.4s"></span>
                    </div>
                    <span>TRANSMISSION IN PROGRESS...</span>
                </div>
            </div>

            <!-- Message Input Area -->
            <div class="border-t border-blue/20 bg-gradient-to-r from-darkgrey-dark via-darkgrey to-darkgrey-dark p-2 backdrop-blur-xl relative">
                <div class="absolute inset-0 bg-gradient-to-r from-blue/5 to-transparent opacity-50"></div>
                <div class="relative z-10">
                    <div class="flex items-end space-x-4">
                        <div class="flex-1 relative">
                            <div class="flex justify-between items-center mt-3 px-2">
                                <span id="charCounter" class="text-xs text-silver-dark font-medium">0/500</span>
                            </div>
                            <div class="flex items-center bg-gradient-to-r from-darkgrey-light/60 to-darkgrey-light/40 border-2 border-blue/20 rounded-xl backdrop-blur-xl transition-all duration-300 hover:border-blue/40 focus-within:border-blue/60 focus-within:shadow-lg focus-within:shadow-blue/20">
                                <input id="messageInput" rows="1" placeholder="TRANSMIT MESSAGE..." class="flex-1 px-3 py-1.5 bg-transparent border-0 resize-none focus:ring-0 focus:outline-none text-white placeholder-silver-dark/70 transition-all font-mono text-sm"></input>
                                <div class="px-2 py-1.5 border-l border-blue/30">
                                    <button id="sendBtn" class="p-1.5 bg-gradient-to-r from-blue to-blue-dark text-white rounded-lg transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-blue/30 disabled:opacity-50 disabled:cursor-not-allowed font-bold">
                                        <i class="fas fa-paper-plane text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                 
                </div>
            </div>
        </main>
    </div>

    <!-- Add Channel Modal -->
    <div id="channelModal" class="fixed inset-0 bg-black/90 backdrop-blur-2xl z-50 hidden items-center justify-center p-6">
        <div class="bg-gradient-to-br from-darkgrey-dark to-darkgrey border-2 border-blue/30 rounded-3xl max-w-lg w-full p-8 shadow-2xl shadow-blue/20 backdrop-blur-xl relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-blue/10 to-transparent opacity-50"></div>
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold text-white tracking-wider">NEW CHANNEL</h3>
                    <button id="closeModalBtn" class="text-silver hover:text-blue transition-colors hover:scale-110">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <input type="text" id="channelNameInput" placeholder="channel-name" class="w-full px-5 py-4 bg-darkgrey-light/50 border-2 border-blue/30 rounded-2xl text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono backdrop-blur transition-all">
                <div class="flex justify-end space-x-4 mt-8">
                    <button id="cancelModalBtn" class="px-6 py-3 text-silver hover:text-white hover:bg-blue/10 rounded-2xl transition-all font-mono font-medium border border-silver/30 hover:border-blue/30">CANCEL</button>
                    <button id="createChannelBtn" class="px-6 py-3 bg-gradient-to-r from-blue to-blue-dark text-white rounded-2xl transition-all hover:scale-105 hover:shadow-lg hover:shadow-blue/30 font-mono font-bold">CREATE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="app.js"></script>
</body>
</html>
