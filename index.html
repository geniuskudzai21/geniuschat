<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS — Secure Messaging</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Custom Tailwind Config Override -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-subtle': 'bounce 1s ease-in-out infinite',
                        'typing-pulse': 'typingBlink 1.4s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        typingBlink: {
                            '0%, 60%, 100%': { opacity: '1' },
                            '30%': { opacity: '0.3' },
                        },
                    },
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        accent: {
                            50: '#f0f9ff',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 2px;
        }
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        /* Typing animation dots */
        .typing-dot {
            animation: typingPulse 1.4s infinite;
            animation-fill-mode: both;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingPulse {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        /* Cyberpunk border effects */
        .cyber-border {
            border: 1px solid #334155;
            position: relative;
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(45deg, #0ea5e9, transparent, #0ea5e9);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cyber-border:hover::before {
            opacity: 0.3;
        }
        /* Sidebar slide animation for mobile */
        .sidebar-mobile {
            transition: transform 0.3s ease-in-out;
        }
        body.sidebar-open .sidebar-mobile {
            transform: translateX(0);
        }
        /* Glass morphism effect for header */
        .glass-header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 transition-colors duration-300">

    <!-- Main App Container -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- ======================== SIDEBAR ======================== -->
        <aside class="sidebar-mobile fixed inset-y-0 left-0 z-30 w-72 bg-slate-900 border-r border-slate-800 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300">
            <div class="flex flex-col h-full">
                <!-- Sidebar Header -->
                <div class="p-6 border-b border-slate-800 bg-slate-950">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-accent-600 rounded flex items-center justify-center">
                                <i class="fas fa-network-wired text-sm text-white"></i>
                            </div>
                            <h1 class="text-lg font-mono font-bold text-slate-100">NEXUS</h1>
                        </div>
                        <button id="closeSidebarBtn" class="md:hidden text-slate-400 hover:text-slate-200">
                            <i class="fas fa-times text-lg"></i>
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 mt-2 font-mono">SECURE COMMUNICATION</p>
                </div>

                <!-- User Profile Summary -->
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <div class="flex items-center space-x-3">
                        <div class="relative">
                            <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center text-slate-300 font-mono text-sm border border-slate-600">
                                G.U.
                            </div>
                            <span class="absolute bottom-0 right-0 w-3 h-3 bg-accent-500 border-2 border-slate-900 rounded-full"></span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-mono text-sm font-semibold text-slate-200">Guest User</h3>
                            <p class="text-xs text-slate-500">ACTIVE</p>
                        </div>
                        <button id="themeToggle" class="p-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700 transition border border-slate-700">
                            <i class="fas fa-cog text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Channels List -->
                <div class="flex-1 overflow-y-auto p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-xs font-mono font-semibold text-slate-500 uppercase tracking-wider">Channels</h4>
                        <button id="addChannelBtn" class="text-accent-500 hover:text-accent-400">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                    <div id="channelsList" class="space-y-1">
                        <!-- Dynamic channels will be injected here -->
                    </div>
                </div>

                <!-- Footer -->
                <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-600 font-mono">
                    <i class="fas fa-shield-alt"></i> ENCRYPTED & PRIVATE
                </div>
            </div>
        </aside>

        <!-- ======================== MAIN CHAT AREA ======================== -->
        <main class="flex-1 flex flex-col h-full w-full overflow-hidden">
            
            <!-- Chat Header -->
            <header class="glass-header px-6 py-4 flex items-center justify-between border-b border-slate-800">
                <div class="flex items-center space-x-4">
                    <button id="openSidebarBtn" class="md:hidden text-slate-400 hover:text-slate-200">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <div>
                        <h2 id="channelName" class="font-mono font-semibold text-slate-100 text-lg">#general</h2>
                        <p id="channelStatus" class="text-xs text-slate-500 flex items-center gap-2">
                            <span class="w-2 h-2 bg-accent-500 rounded-full inline-block"></span>
                            <span>12 NODES ACTIVE</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button class="p-2 rounded-lg hover:bg-slate-800 transition border border-slate-700">
                        <i class="fas fa-search text-slate-400 text-sm"></i>
                    </button>
                    <button class="p-2 rounded-lg hover:bg-slate-800 transition border border-slate-700">
                        <i class="fas fa-cog text-slate-400 text-sm"></i>
                    </button>
                </div>
            </header>

            <!-- Messages Container -->
            <div id="messagesContainer" class="messages-container flex-1 overflow-y-auto p-6 space-y-4 bg-slate-950">
                <!-- Welcome Message -->
                <div class="flex flex-col items-center justify-center h-full text-center">
                    <div class="w-16 h-16 bg-slate-800 rounded-lg flex items-center justify-center mb-6 border border-slate-700">
                        <i class="fas fa-network-wired text-2xl text-accent-500"></i>
                    </div>
                    <h3 class="text-xl font-mono font-semibold text-slate-300">NEXUS TERMINAL</h3>
                    <p class="text-slate-500 mt-3 max-w-md font-mono text-sm">Secure channel established. Awaiting transmission...</p>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="px-6 py-2 hidden">
                <div class="flex items-center space-x-2 text-xs text-slate-500 font-mono">
                    <div class="flex space-x-1">
                        <span class="typing-dot w-1.5 h-1.5 bg-accent-500 rounded-full inline-block"></span>
                        <span class="typing-dot w-1.5 h-1.5 bg-accent-500 rounded-full inline-block"></span>
                        <span class="typing-dot w-1.5 h-1.5 bg-accent-500 rounded-full inline-block"></span>
                    </div>
                    <span>TRANSMISSION IN PROGRESS...</span>
                </div>
            </div>

            <!-- Message Input Area -->
            <div class="border-t border-slate-800 bg-slate-900 p-4">
                <div class="flex items-end space-x-3">
                    <button id="attachBtn" class="text-slate-500 hover:text-accent-400 transition-colors p-2 rounded-lg hover:bg-slate-800 border border-slate-700">
                        <i class="fas fa-paperclip text-sm"></i>
                    </button>
                    <div class="flex-1 relative">
                        <textarea id="messageInput" rows="1" placeholder="TRANSMIT MESSAGE..." class="w-full px-4 py-3 pr-12 bg-slate-800 border border-slate-700 rounded-lg resize-none focus:ring-2 focus:ring-accent-500 focus:border-accent-500 text-slate-100 placeholder-slate-500 transition-all font-mono text-sm"></textarea>
                        <button id="sendBtn" class="absolute right-2 bottom-2 p-2 bg-accent-600 hover:bg-accent-700 text-white rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                    <button id="emojiBtn" class="text-slate-500 hover:text-accent-400 transition-colors p-2 rounded-lg hover:bg-slate-800 border border-slate-700">
                        <i class="far fa-smile text-sm"></i>
                    </button>
                </div>
                <div class="flex justify-between items-center mt-2 px-1">
                    <span class="text-xs text-slate-600 font-mono">ENTER TO TRANSMIT</span>
                    <span id="charCounter" class="text-xs text-slate-600 font-mono">0/500</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Channel Modal -->
    <div id="channelModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-lg max-w-md w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-mono font-bold text-slate-100">NEW CHANNEL</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-200">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <input type="text" id="channelNameInput" placeholder="channel-name" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-slate-100 placeholder-slate-500 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 font-mono text-sm">
            <div class="flex justify-end space-x-3 mt-6">
                <button id="cancelModalBtn" class="px-4 py-2 text-slate-400 hover:bg-slate-800 rounded-lg transition font-mono text-sm">CANCEL</button>
                <button id="createChannelBtn" class="px-4 py-2 bg-accent-600 hover:bg-accent-700 text-white rounded-lg transition font-mono text-sm">CREATE</button>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="app.js"></script>
</body>
</html>
