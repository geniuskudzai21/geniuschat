<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GENIUSCHAT — Sign Up</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'blue': 'rgb(59, 130, 246)',
                        'blue-light': 'rgb(147, 197, 253)',
                        'silver': '#e5e7eb',
                        'silver-dark': '#9ca3af',
                        'silver-light': '#f3f4f6',
                        'darkgrey': '#374151',
                        'darkgrey-light': '#4b5563',
                        'darkgrey-dark': '#1f2937'
                    },
                    fontFamily: {
                        'mono': ['Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-silver font-mono overflow-hidden min-h-screen flex items-center justify-center">
    
    <!-- Background Pattern -->
    <div class="absolute inset-0 bg-gradient-to-br from-black via-darkgrey-dark to-black">
        <div class="absolute inset-0 bg-gradient-to-br from-blue/5 via-transparent to-blue/5 opacity-30"></div>
    </div>
    
    <!-- Signup Container -->
    <div class="relative z-10 w-full max-w-sm mx-auto p-4">
        <div class="bg-gradient-to-b from-darkgrey-dark to-black border-2 border-blue/30 rounded-2xl p-6 shadow-2xl shadow-blue/20 backdrop-blur-xl relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-blue/10 to-transparent opacity-50"></div>
            
            <div class="relative z-10">
                <!-- Logo and Title -->
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue/20 to-blue/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border-2 border-blue/30 shadow-xl shadow-blue/20 backdrop-blur">
                        <i class="fas fa-user-plus text-2xl text-blue"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white tracking-wider mb-1">JOIN GENIUSCHAT</h1>
                    <p class="text-silver-dark text-xs tracking-widest text-blue/80">CREATE ACCOUNT</p>
                </div>
                
                <!-- Signup Form -->
                <form id="signupForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-silver-dark mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-silver-dark text-sm"></i>
                            </div>
                            <input type="email" id="email" required placeholder="your@email.com" 
                                class="w-full pl-10 pr-4 py-2 bg-darkgrey-light/50 border-2 border-blue/30 rounded-lg text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono text-sm backdrop-blur transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-silver-dark mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-silver-dark text-sm"></i>
                            </div>
                            <input type="password" id="password" required placeholder="••••••••" minlength="6"
                                class="w-full pl-10 pr-4 py-2 bg-darkgrey-light/50 border-2 border-blue/30 rounded-lg text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono text-sm backdrop-blur transition-all">
                        </div>
                        <p class="text-xs text-silver-dark mt-1">Minimum 6 characters</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-silver-dark mb-2">Confirm Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-silver-dark text-sm"></i>
                            </div>
                            <input type="password" id="confirmPassword" required placeholder="••••••••" minlength="6"
                                class="w-full pl-10 pr-4 py-2 bg-darkgrey-light/50 border-2 border-blue/30 rounded-lg text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono text-sm backdrop-blur transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-silver-dark mb-2">Display Name (Optional)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-silver-dark text-sm"></i>
                            </div>
                            <input type="text" id="displayName" placeholder="John Doe" maxlength="50"
                                class="w-full pl-10 pr-4 py-2 bg-darkgrey-light/50 border-2 border-blue/30 rounded-lg text-white placeholder-silver-dark focus:ring-4 focus:ring-blue/20 focus:border-blue font-mono text-sm backdrop-blur transition-all">
                        </div>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" id="terms" required class="mr-2">
                        <label for="terms" class="text-sm text-silver-dark">
                            I agree to the <a href="#" class="text-blue hover:text-blue-light transition-colors">Terms of Service</a> and <a href="#" class="text-blue hover:text-blue-light transition-colors">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="w-full py-2 bg-gradient-to-r from-blue to-blue-dark text-white rounded-lg transition-all hover:scale-105 hover:shadow-lg hover:shadow-blue/30 font-mono font-bold text-sm">
                        <i class="fas fa-rocket mr-2"></i>
                        CREATE ACCOUNT
                    </button>
                </form>
                
                <!-- Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-silver/30"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-transparent text-silver-dark">OR</span>
                    </div>
                </div>
                
                <!-- Sign In Link -->
                <div class="text-center">
                    <p class="text-silver-dark text-sm mb-4">Already have an account?</p>
                    <a href="login.html" class="inline-flex items-center px-6 py-3 text-blue border-2 border-blue/30 rounded-2xl hover:bg-blue/10 transition-all font-mono font-medium">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        SIGN IN
                    </a>
                </div>
                
                <!-- Back to App -->
                <div class="text-center mt-6">
                    <a href="index.html" class="text-silver-dark text-sm hover:text-silver transition-colors">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Back to App
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Auth Script -->
    <script src="auth.js"></script>
    
    <script>
        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const displayName = document.getElementById('displayName').value.trim();
            const termsAccepted = document.getElementById('terms').checked;
            
            // Validation
            if (!email || !password || !confirmPassword) {
                showError('Please fill in all required fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (!termsAccepted) {
                showError('Please accept the terms of service');
                return;
            }
            
            const result = await signUpWithEmail(email, password);
            if (result) {
                // If account created and signed in, redirect to main app
                if (result.user && result.session) {
                    window.location.href = 'index.html';
                } else {
                    // If email verification required, show message
                    showSuccess('Account created! Please check your email to verify your account.');
                    // Redirect to login page after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            }
        });
        
        // Show error function
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed top-4 right-4 bg-red-500/20 border-2 border-red-500/50 rounded-xl p-4 text-red-400 font-mono text-sm backdrop-blur z-50';
            errorDiv.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    <span>ERROR: ${message}</span>
                </div>
            `;
            
            document.body.appendChild(errorDiv);
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }
        
        // Show success function
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'fixed top-4 right-4 bg-green-500/20 border-2 border-green-500/50 rounded-xl p-4 text-green-400 font-mono text-sm backdrop-blur z-50';
            successDiv.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span>SUCCESS: ${message}</span>
                </div>
            `;
            
            document.body.appendChild(successDiv);
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }
    </script>
</body>
</html>
